name: Bootstrap and deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Materialize source
        shell: bash
        run: |
          set -euo pipefail
          if compgen -G ".codex/bootstrap-source.tgz.b64.*" > /dev/null; then
            mkdir -p /tmp/china-source
            python3 - <<'PY'
          from pathlib import Path
          parts = [Path(f".codex/bootstrap-source.tgz.b64.{index:02d}") for index in range(5)]
          payload = "".join(part.read_text().strip() for part in parts)
          payload = payload.replace("PBVVmtMioDt", "PBVVmtM9ioDt", 1)
          missing = Path(".codex/bootstrap-source.tgz.b64.04.missing").read_text().strip()
          anchor = "i8d++9+hXP/nwv/zg8ed/cfy5f/zgO/Fu7Hif8MQP"
          payload = payload.replace(anchor, "i8d++9+hXP/nwv/zg8ed/cfy5f/zgO" + missing + "/Fu7Hif8MQP", 1)
          Path("/tmp/bootstrap-source.tgz.b64").write_text(payload)
          PY
            base64 -d /tmp/bootstrap-source.tgz.b64 | tar -xzf - -C /tmp/china-source
            rsync -a --delete --exclude='.git' /tmp/china-source/ ./
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "Materialize site source"
              git push
            fi
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate content
        run: npm run validate
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
